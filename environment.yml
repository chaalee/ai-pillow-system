name: ai-pillow
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - matplotlib>=3.7
  - seaborn>=0.12
  - scikit-learn>=1.3
  - jupyter
  - ipykernel
  - tqdm
  - pyyaml
  - pyserial
  - pip

  # PyTorch (CPU build; replace with pytorch-gpu for CUDA)
  - pytorch>=2.0
  - torchvision
  - cpuonly

  - pip:
    - onnxruntime>=1.15.0
    - opencv-python>=4.8.0
    - pytesseract>=0.3.10
    - mss>=9.0.1
